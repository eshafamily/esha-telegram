<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --tg:#0088cc;
    --tg2:#229ED9;
    --bg1:#0f1419;
    --bg2:#1a2530;
  }
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 50% 0%, #1f3a4d 0%, var(--bg1) 55%, #070b0f 100%);
    color:#fff;
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .card{
    width:100%;
    max-width:380px;
    text-align:center;
    animation:rise .6s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  /* ---- Profile pic ---- */
  .avatar-wrap{
    position:relative;
    width:140px;
    height:140px;
    margin:0 auto 22px;
  }
  .avatar-wrap::before{
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background:conic-gradient(from 180deg, var(--tg), var(--tg2), #5ed0ff, var(--tg));
    filter:blur(2px);
    opacity:.9;
    animation:spin 6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .avatar{
    position:relative;
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid var(--bg1);
    background:linear-gradient(135deg,var(--tg),var(--tg2));
    display:block;
  }
  /* fallback initial if image missing */
  .avatar-fallback{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:5px solid var(--bg1);
    background:linear-gradient(135deg,var(--tg),var(--tg2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    font-weight:700;
    z-index:-1;
  }

  /* ---- Name ---- */
  .name{
    font-size:26px;
    font-weight:700;
    letter-spacing:.3px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .verified{
    width:22px;height:22px;flex:none;
  }
  .tagline{
    color:#9fb4c4;
    font-size:15px;
    margin-bottom:30px;
  }

  /* ---- Join button ---- */
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:16px 20px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--tg2),var(--tg));
    color:#fff;
    font-size:17px;
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,136,204,.45);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(0,136,204,.6)}
  .btn:active{transform:translateY(0)}
  .btn svg{width:24px;height:24px;flex:none}

  .footer{
    margin-top:26px;
    font-size:12px;
    color:#5d7385;
  }
</style>
